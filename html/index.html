<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>noff</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0f1117;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        .badge {
            display: inline-block;
            background: #1a1f2e;
            border: 1px solid #2d3748;
            border-radius: 9999px;
            padding: 0.25rem 0.75rem;
            font-size: 0.75rem;
            color: #68d391;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
        }

        p {
            font-size: 1.125rem;
            color: #a0aec0;
            margin-bottom: 2rem;
            max-width: 480px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1rem;
            max-width: 560px;
            margin: 0 auto;
        }

        .info-card {
            background: #1a1f2e;
            border: 1px solid #2d3748;
            border-radius: 0.75rem;
            padding: 1rem;
        }

        .info-card .label {
            font-size: 0.7rem;
            color: #4a5568;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 0.25rem;
        }

        .info-card .value {
            font-size: 0.9rem;
            color: #e2e8f0;
            font-weight: 600;
        }

        .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #68d391;
            border-radius: 50%;
            margin-right: 0.4rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">
            <span class="dot"></span>deployed
        </div>
        <h1>noff</h1>
        <p>Your nginx server is running successfully on EC2 in us-east-1.</p>
        <div class="info-grid">
            <div class="info-card">
                <div class="label">App</div>
                <div class="value">nginx</div>
            </div>
            <div class="info-card">
                <div class="label">Target</div>
                <div class="value">EC2</div>
            </div>
            <div class="info-card">
                <div class="label">Region</div>
                <div class="value">us-east-1</div>
            </div>
            <div class="info-card">
                <div class="label">Status</div>
                <div class="value">Online</div>
            </div>
        </div>
    </div>
</body>
</html>
