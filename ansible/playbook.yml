---
- name: Deploy nginx on EC2
  hosts: all
  become: yes
  vars:
    app_name: noff
    web_root: /var/www/html

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install nginx
      apt:
        name: nginx
        state: present

    - name: Ensure web root directory exists
      file:
        path: "{{ web_root }}"
        state: directory
        owner: www-data
        group: www-data
        mode: "0755"

    - name: Check if index.html exists in repo
      stat:
        path: "{{ playbook_dir }}/../index.html"
      delegate_to: localhost
      register: index_html_stat

    - name: Deploy index.html from repo
      copy:
        src: ../index.html
        dest: "{{ web_root }}/index.html"
        owner: www-data
        group: www-data
        mode: "0644"
      when: index_html_stat.stat.exists
      notify: reload nginx

    - name: Deploy default index.html
      copy:
        content: |
          <!DOCTYPE html>
          <html lang="en">
          <head><meta charset="UTF-8"><title>{{ app_name }}</title></head>
          <body style="font-family:Arial,sans-serif;display:flex;justify-content:center;
                       align-items:center;height:100vh;margin:0;background:#f0f2f5;">
            <div style="text-align:center;background:white;padding:40px 60px;
                        border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,.1);">
              <h1>{{ app_name }}</h1>
              <p>Deployed with Ansible</p>
            </div>
          </body>
          </html>
        dest: "{{ web_root }}/index.html"
        owner: www-data
        group: www-data
        mode: "0644"
      when: not index_html_stat.stat.exists
      notify: reload nginx

    - name: Remove default nginx config
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: reload nginx

    - name: Create nginx site config
      copy:
        content: |
          server {
              listen 80 default_server;
              listen [::]:80 default_server;
              root {{ web_root }};
              index index.html;
              server_name _;
              location / {
                  try_files $uri $uri/ =404;
              }
          }
        dest: /etc/nginx/sites-enabled/app
        mode: "0644"
      notify: reload nginx

    - name: Ensure nginx is started and enabled
      service:
        name: nginx
        state: started
        enabled: yes

  handlers:
    - name: reload nginx
      service:
        name: nginx
        state: reloaded